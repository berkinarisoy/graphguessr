{% extends "base.html" %}
{% block title %}GraphGuesser — Host Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header text-center">
        <span style="color:var(--gg-accent)" class="fw-bold">Host Login</span>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label section-label">Admin Password</label>
            <input type="password" name="password" class="form-control"
                   autofocus required placeholder="Enter password"/>
          </div>
          <button type="submit" class="btn btn-accent w-100">
            <i class="bi bi-lock-fill me-1"></i> Log In
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
