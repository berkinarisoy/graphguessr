{% extends "base.html" %}
{% block title %}GraphGuesser — Submitted!{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-check-circle-fill fs-1" style="color:#69f0ae"></i>
  <h2 class="mt-3 fw-bold">Submission Received!</h2>
  <p class="text-muted mt-2">
    <strong>{{ team }}</strong> submitted: <code>f(x) = {{ expression }}</code>
  </p>
  <p class="text-muted small">
    Your guess is stored privately. The host will reveal all submissions and scores together.
  </p>
  <a href="{{ url_for('index') }}" class="btn btn-accent mt-3">
    <i class="bi bi-arrow-left me-1"></i> Back to Game
  </a>
</div>
{% endblock %}
